<div class="home">
  <!-- Background blobs -->
  <div class="home__blob home__blob--1"></div>
  <div class="home__blob home__blob--2"></div>

  <!-- Header / Brand -->
  <header class="home-header">
    <span class="home-header__label">Entrena sin pensar</span>
    <h1 class="home-header__title">LESGOU</h1>
    <span class="home-header__tagline">Tu entrenador en la muñeca</span>
  </header>

  <!-- Stats -->
  <section class="home-stats">
    <div class="home-stats__row">
      <div class="stat-card">
        <span class="stat-card__num">{{ stats.streak }}</span>
        <span class="stat-card__label">Racha</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__num">{{ stats.points }}</span>
        <span class="stat-card__label">Puntos</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__num">{{ stats.sessions }}</span>
        <span class="stat-card__label">Sesiones</span>
      </div>
    </div>
    <div class="streak-badge">
      <div class="streak-badge__dot"></div>
      <span class="streak-badge__text">
        Mejor racha: <span>{{ stats.bestStreak }} días</span>
      </span>
    </div>
  </section>

  <!-- Main CTA -->
  <div class="home-cta">
    <button
      class="main-btn"
      (click)="startWorkout()"
      aria-label="Empezar entrenamiento"
    >
      <span class="main-btn__text">LESGOU</span>
      <span class="main-btn__sub">Empezar ya</span>
    </button>
  </div>

  <!-- Bottom -->
  <div class="home-bottom">
    <!-- Mode toggle -->
    <div class="mode-toggle" role="group" aria-label="Modo de personalidad">
      <button
        class="mode-toggle__btn"
        [class.mode-toggle__btn--active]="mode() === 'normal'"
        [class.mode-toggle__btn--inactive]="mode() !== 'normal'"
        (click)="setMode('normal')"
      >
        Normal
      </button>
      <button
        class="mode-toggle__btn"
        [class.mode-toggle__btn--active]="mode() === 'cabron'"
        [class.mode-toggle__btn--inactive]="mode() !== 'cabron'"
        (click)="setMode('cabron')"
      >
        Cabrón
      </button>
    </div>

    <!-- Nav -->
    <nav class="bottom-nav" aria-label="Navegación principal">
      @for (item of navItems; track item.icon) {
        <div class="bottom-nav__item">
          <i
            class="ti {{ item.icon }} bottom-nav__icon"
            [class.bottom-nav__icon--active]="item.active"
            [class.bottom-nav__icon--inactive]="!item.active"
            aria-hidden="true"
          ></i>
          <div
            class="bottom-nav__dot"
            [class.bottom-nav__dot--active]="item.active"
            [class.bottom-nav__dot--inactive]="!item.active"
          ></div>
        </div>
      }
    </nav>
  </div>
</div>
